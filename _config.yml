# Site settings
title: SAGE 2026
description: > # this means to ignore newlines until "baseurl:"
  Semantic Architectures for Governance and Explainability workshop at SEMANTiCS 2026.
repository: sage2026workshop/sage2026
baseurl: "/sage2026" # the subpath of your site, e.g. /blog/
url: "https://sage2026workshop.github.io" # the base hostname & protocol for your site
author: SAGE 2026 Organizing Committee
lang: en_US

# Build settings
safe: true # always trues on github-pages, disables _plugins/
markdown: kramdown
sass:
  indentWidth: 4
  style: compressed
  precision: 10
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
exclude:
  - vendor
  - Gemfile
  - Gemfile.lock
  - build-in-docker.sh
  - README.md
